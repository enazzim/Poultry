server.port=8080

spring.datasource.url=jdbc:mariadb://localhost:3306/poultry?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=root
spring.datasource.password=1111
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

app.jwt.secret=PoultryPlatformJwtSecretKeyForDevOnlyChangeInProduction2026!!
app.jwt.expiration-ms=86400000
app.mes.api-key=mes-dev-api-key-change-me

# NotifyPort / future company Notify API
app.notify.api-enabled=true
# Solapi SMS (disabled = dry-run log only)
app.notify.solapi.enabled=false
app.notify.solapi.api-key=
app.notify.solapi.api-secret=
app.notify.solapi.sender=
# Kakao Alimtalk via Solapi (needs approved template)
app.notify.kakao.enabled=false
app.notify.kakao.pf-id=
app.notify.kakao.template-id=

spring.jackson.serialization.write-dates-as-timestamps=false
